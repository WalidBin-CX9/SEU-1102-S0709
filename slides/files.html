<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigating the Web Layers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

        body {
            font-family: 'Space+Mono', monospace;
            background-color: #050505;
            color: white;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .web-layer {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 2rem;
            text-align: center;
        }

        /* Surface Web Styling */
        #surface {
            background: linear-gradient(180deg, #1e3a8a 0%, #0c4a6e 100%);
        }

        /* Deep Web Styling */
        #deep {
            background: linear-gradient(180deg, #0c4a6e 0%, #020617 100%);
        }

        /* Dark Web Styling */
        #dark {
            background: radial-gradient(circle, #111 0%, #000 100%);
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            max-width: 800px;
            transition: 0.3s;
        }

        .card:hover {
            border-color: #3b82f6;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
        }

        .scroll-indicator {
            position: absolute;
            bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body>

    <section id="surface" class="web-layer">
        <div class="card animate__animated animate__fadeIn">
            <h1 class="text-5xl font-bold mb-4 text-blue-300">🌊 SURFACE WEB</h1>
            <p class="text-xl mb-6">Visible Web - Only 4% of the Internet</p>
            <div class="grid grid-cols-3 gap-4 text-sm">
                <div class="p-4 bg-blue-900/30 rounded-lg">Google / Bing</div>
                <div class="p-4 bg-blue-900/30 rounded-lg">Social Media</div>
                <div class="p-4 bg-blue-900/30 rounded-lg">Public Websites</div>
            </div>
            <p class="mt-8 text-gray-300 italic">Indexed by search engines and accessible to everyone.</p>
        </div>
        <div class="scroll-indicator">▼ Scroll Deeper</div>
    </section>

    <section id="deep" class="web-layer">
        <div class="card floating">
            <h1 class="text-5xl font-bold mb-4 text-cyan-400">🧊 DEEP WEB</h1>
            <p class="text-xl mb-6">Non-Indexed - 90% of the Internet</p>
            <div class="grid grid-cols-3 gap-4 text-sm text-left">
                <div class="p-4 bg-cyan-900/3
